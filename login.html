<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Minigrid System Monitor · Karazhar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="dashboard.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--bg);
  }

  .login-container {
    width: 100%;
    max-width: 400px;
    padding: 0 1rem;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2.5rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    animation: fadeUp 0.5s ease both;
    transition: background 0.3s ease, border-color 0.3s ease;
  }

  body.light .login-card {
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .login-header {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .login-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.03em;
  }

  .login-subtitle {
    font-size: 0.88rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .login-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 0.5rem;
    width: 52px;
    height: 52px;
    border-radius: 14px;
    background: var(--accent-dim);
    border: 1px solid rgba(0, 229, 160, 0.2);
    color: var(--accent);
  }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .form-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    padding: 0.7rem 0.8rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
  }

  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0, 229, 160, 0.1);
  }

  .form-input::placeholder {
    color: var(--text-dim);
    font-size: 0.85rem;
  }

  .login-btn {
    width: 100%;
    padding: 0.75rem;
    border-radius: 8px;
    border: 1px solid rgba(0, 229, 160, 0.3);
    background: rgba(0, 229, 160, 0.12);
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    margin-top: 0.5rem;
  }

  .login-btn:hover {
    background: rgba(0, 229, 160, 0.22);
    border-color: rgba(0, 229, 160, 0.5);
  }

  .login-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .login-error {
    background: rgba(255, 107, 107, 0.1);
    border: 1px solid rgba(255, 107, 107, 0.25);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    font-size: 0.85rem;
    color: var(--gen);
    text-align: center;
    display: none;
  }

  .login-error.visible {
    display: block;
  }

  .login-footer {
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    line-height: 1.5;
  }

  .login-theme-toggle {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 100;
  }
</style>
</head>
<body>

<div class="login-theme-toggle">
  <div class="theme-toggle" onclick="toggleLoginTheme()" title="Toggle light/dark mode" style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;">
    <span style="font-size:1rem;">☀️</span>
    <div style="width:38px;height:20px;border-radius:10px;background:var(--surface3);border:1px solid var(--border2);position:relative;transition:background 0.3s;">
      <div id="login-toggle-thumb" style="width:14px;height:14px;border-radius:50%;background:var(--text-muted);position:absolute;top:2px;left:2px;transition:transform 0.3s,background 0.3s;"></div>
    </div>
    <span style="font-size:1rem;">🌙</span>
  </div>
</div>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      </div>
      <span class="login-title">Minigrid System Monitor</span>
      <span class="login-subtitle">Karazhar, Akmola Region, Kazakhstan</span>
    </div>

    <div class="login-error" id="login-error">Invalid username or password</div>

    <div class="login-form">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" class="form-input" id="username" placeholder="Enter username" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" class="form-input" id="password" placeholder="Enter password" autocomplete="current-password">
      </div>
      <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
    </div>

    <div class="login-footer">
      ENG30002 · Mini-Grid Project<br>
      Swinburne University of Technology Sarawak
    </div>
  </div>
</div>

<script>
  // Theme toggle for login page
  function getTheme() { return localStorage.getItem('karazhar-theme') || 'dark'; }
  function applyLoginTheme(theme) {
    if (theme === 'light') {
      document.body.classList.add('light');
      const thumb = document.getElementById('login-toggle-thumb');
      if (thumb) { thumb.style.transform = 'translateX(0)'; thumb.style.background = 'var(--accent)'; }
    } else {
      document.body.classList.remove('light');
      const thumb = document.getElementById('login-toggle-thumb');
      if (thumb) { thumb.style.transform = 'translateX(18px)'; thumb.style.background = 'var(--text-muted)'; }
    }
    localStorage.setItem('karazhar-theme', theme);
  }
  function toggleLoginTheme() {
    applyLoginTheme(getTheme() === 'dark' ? 'light' : 'dark');
  }
  applyLoginTheme(getTheme());

  // If already logged in, redirect to dashboard
  fetch('/api/auth_status')
    .then(r => r.json())
    .then(d => { if (d.logged_in) window.location.href = '/'; })
    .catch(() => {});

  // Enter key support
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });

  async function doLogin() {
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      errEl.textContent = 'Please enter both username and password';
      errEl.classList.add('visible');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    errEl.classList.remove('visible');

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.ok) {
        window.location.href = '/';
      } else {
        errEl.textContent = data.error || 'Invalid credentials';
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    } catch (e) {
      errEl.textContent = 'Connection error — is the server running?';
      errEl.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
